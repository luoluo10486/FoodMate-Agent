spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/FoodMate}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration

foodmate:
  runtime:
    stub-enabled: false

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/foodmate}
    username: ${DB_USERNAME:foodmate}
    password: ${DB_PASSWORD:foodmate}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration

foodmate:
  runtime:
    stub-enabled: false


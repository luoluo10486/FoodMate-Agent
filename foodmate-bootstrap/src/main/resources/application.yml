spring:
  application:
    name: foodmate
  profiles:
    default: local-stub
  jackson:
    time-zone: UTC
    default-property-inclusion: non_null

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

foodmate:
  security:
    cookie-secure: ${FOODMATE_COOKIE_SECURE:true}
  runtime:
    stub-enabled: false
    contract-version: ${RUNTIME_CONTRACT_VERSION:v1}
    service-jwt:
      enabled: ${RUNTIME_SERVICE_JWT_ENABLED:true}
      java-private-key: ${RUNTIME_JAVA_PRIVATE_KEY:}
      java-public-key: ${RUNTIME_JAVA_PUBLIC_KEY:}
      java-kid: ${RUNTIME_JAVA_KID:}
      python-public-key: ${RUNTIME_PYTHON_PUBLIC_KEY:}
  model:
    default-chat-model: qwen-plus
    default-embed-model: text-embedding-v4
    timeout-ms: 15000
  gateway:
    base-url: http://model-gateway.internal
    api-key: ${MODEL_GATEWAY_KEY:}
  rag:
    top-k: 12
    rerank-top-n: 5
    collection: foodmate_knowledge
  milvus:
    host: localhost
    port: 19530
    token: ${MILVUS_TOKEN:}
  mcp:
    read-timeout-ms: 5000
  sql-agent:
    readonly-enforced: true
    max-rows: 500
  tool:
    enabled:
      calculator: true
      time-parser: true
      knowledge-search: true
      database-query: true
      food-log-writer: true
      plan-validator: true
  audit:
    enabled: true

mybatis-plus:
  global-config:
    db-config:
      logic-delete-field: isDeleted
      logic-delete-value: true
      logic-not-delete-value: false
  configuration:
    map-underscore-to-camel-case: true

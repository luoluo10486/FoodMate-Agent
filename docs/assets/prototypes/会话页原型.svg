  <rect x="48" y="176" width="184" height="62" rx="8" fill="#EDF4EF" stroke="#B9D1BF"/>
  <text x="64" y="202" font-family="Noto Sans SC, Microsoft YaHei, Arial" font-size="13" font-weight="700" fill="#23251F">一周备餐计划</text>

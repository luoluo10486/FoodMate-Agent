  <text x="340" y="456" font-family="Noto Sans SC, Microsoft YaHei, Arial" font-size="12" fill="#6F7468">摘要：生成 5 天午晚餐，优先复用鸡胸肉、鸡蛋、绿叶菜。</text>
  <rect x="340" y="482" width="128" height="34" rx="8" fill="#FFFFFF" stroke="#E5E0D3"/>

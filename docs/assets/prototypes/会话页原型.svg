  <text x="505" y="504" font-family="Noto Sans SC, Microsoft YaHei, Arial" font-size="12" font-weight="700" fill="#FFFFFF">确认保存</text>

  <rect x="286" y="646" width="596" height="56" rx="10" fill="#FFFFFF" stroke="#CFC8B8"/>
  <text x="316" y="680" font-family="Noto Sans SC, Microsoft YaHei, Arial" font-size="13" fill="#6F7468">继续补充约束，例如：不要猪肉，晚餐 30 分钟内完成</text>
  <rect x="804" y="658" width="54" height="32" rx="8" fill="#B94A48"/>
  <text x="818" y="679" font-family="Noto Sans SC, Microsoft YaHei, Arial" font-size="12" font-weight="700" fill="#FFFFFF">停止</text>

  <rect x="910" y="104" width="238" height="598" rx="10" fill="#FBFAF6" stroke="#D9D5C8"/>

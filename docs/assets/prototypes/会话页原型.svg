  <rect x="286" y="174" width="596" height="448" rx="10" fill="#FFFFFF" stroke="#E5E0D3"/>
  <rect x="318" y="204" width="384" height="52" rx="8" fill="#F2EFE6"/>
  <text x="338" y="235" font-family="Noto Sans SC, Microsoft YaHei, Arial" font-size="13" fill="#23251F">帮 2 个人做 5 天工作餐，预算 300 元。</text>
  <rect x="458" y="286" width="390" height="78" rx="8" fill="#EDF4EF" stroke="#B9D1BF"/>

  <circle cx="420" cy="126" r="6" fill="#2F6F4E"/>
  <text x="434" y="131" font-family="Noto Sans SC, Microsoft YaHei, Arial" font-size="12" fill="#2F6F4E">planning</text>
  <line x1="500" y1="126" x2="560" y2="126" stroke="#D9D5C8" stroke-width="2"/>
  <circle cx="576" cy="126" r="6" fill="#D88A3D"/>

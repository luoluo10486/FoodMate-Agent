  <rect x="934" y="250" width="190" height="70" rx="8" fill="#FFFFFF" stroke="#E5E0D3"/>
  <text x="952" y="278" font-family="Noto Sans SC, Microsoft YaHei, Arial" font-size="12" font-weight="700" fill="#23251F">plan_validator</text>

  <text x="934" y="372" font-family="Noto Sans SC, Microsoft YaHei, Arial" font-size="15" font-weight="700" fill="#23251F">引用来源</text>
  <rect x="934" y="398" width="190" height="86" rx="8" fill="#FFFFFF" stroke="#E5E0D3"/>
  <text x="952" y="426" font-family="Noto Sans SC, Microsoft YaHei, Arial" font-size="12" font-weight="700" fill="#23251F">备餐指南</text>
  <text x="952" y="450" font-family="Noto Sans SC, Microsoft YaHei, Arial" font-size="11" fill="#6F7468">食材复用、冷藏保存、预算控制</text>

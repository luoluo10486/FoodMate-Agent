  <text x="386" y="494" font-family="Microsoft YaHei, Arial" font-size="14" fill="#23251F">wang</text><text x="530" y="494" font-family="Microsoft YaHei, Arial" font-size="14" fill="#23251F">王同学</text><rect x="674" y="476" width="62" height="26" rx="4" fill="#F2F3F5"/><text x="692" y="494" font-family="Microsoft YaHei, Arial" font-size="13" fill="#6F7468">user</text><rect x="818" y="476" width="62" height="26" rx="4" fill="#E8FFE9"/><text x="830" y="494" font-family="Microsoft YaHei, Arial" font-size="13" fill="#00A32A">active</text><rect x="932" y="474" width="56" height="28" rx="4" fill="#F2F3F5"/><text x="946" y="493" font-family="Microsoft YaHei, Arial" font-size="13" fill="#405060">锁定</text>
  <rect x="1080" y="288" width="312" height="172" rx="8" fill="#FFFFFF" stroke="#D9D5C8"/>

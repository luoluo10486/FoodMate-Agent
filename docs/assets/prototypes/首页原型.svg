<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" role="img" aria-label="FoodMate 首页原型图">
  <rect width="1440" height="900" fill="#F8F7F3"/>

  <!-- Sidebar -->
  <rect x="0" y="0" width="296" height="900" fill="#FBFAF6"/>
  <line x1="296" y1="0" x2="296" y2="900" stroke="#E5E0D3"/>
  <g transform="translate(28 38)">
    <circle cx="20" cy="20" r="18" fill="#2F6F4E"/>
    <path d="M12 22c10-18 24-13 20 1-4 13-22 13-20-1z" fill="#FFF0DF"/>
    <text x="52" y="27" font-family="Noto Sans SC, Microsoft YaHei, Arial" font-size="22" font-weight="800" fill="#23251F">FoodMate</text>
  </g>
  <rect x="158" y="39" width="104" height="34" rx="17" fill="#FFF0DF" stroke="#E6C49B"/>
  <text x="178" y="61" font-family="Noto Sans SC, Microsoft YaHei, Arial" font-size="13" font-weight="700" fill="#D88A3D">Agent 模式</text>
  <rect x="28" y="112" width="240" height="56" rx="10" fill="#2F6F4E"/>
  <text x="82" y="147" font-family="Noto Sans SC, Microsoft YaHei, Arial" font-size="18" font-weight="800" fill="#FFFFFF">+ 新建 Agent 会话</text>
  <line x1="0" y1="204" x2="296" y2="204" stroke="#E5E0D3"/>
  <text x="28" y="248" font-family="Noto Sans SC, Microsoft YaHei, Arial" font-size="13" font-weight="700" letter-spacing="1" fill="#9AA194">最近 Agent 会话</text>
  <text x="112" y="298" font-family="Noto Sans SC, Microsoft YaHei, Arial" font-size="13" fill="#6F7468">⌄ 加载更多</text>
  <rect x="68" y="370" width="160" height="120" rx="10" fill="#FFFFFF" stroke="#E5E0D3" stroke-dasharray="6 6"/>
  <text x="132" y="428" text-anchor="middle" font-family="Noto Sans SC, Microsoft YaHei, Arial" font-size="34" fill="#C8CDC3">□</text>
  <text x="148" y="462" text-anchor="middle" font-family="Noto Sans SC, Microsoft YaHei, Arial" font-size="17" fill="#9AA194">暂无会话</text>
  <text x="148" y="489" text-anchor="middle" font-family="Noto Sans SC, Microsoft YaHei, Arial" font-size="13" fill="#9AA194">从新任务开始</text>
  <line x1="0" y1="836" x2="296" y2="836" stroke="#E5E0D3"/>
  <circle cx="38" cy="868" r="20" fill="#2F6F4E"/>
  <text x="32" y="875" font-family="Noto Sans SC, Microsoft YaHei, Arial" font-size="18" font-weight="800" fill="#FFFFFF">W</text>
  <text x="72" y="863" font-family="Noto Sans SC, Microsoft YaHei, Arial" font-size="15" font-weight="700" fill="#23251F">wyh</text>
  <text x="72" y="884" font-family="Noto Sans SC, Microsoft YaHei, Arial" font-size="12" fill="#6F7468">查看和编辑资料</text>
  <text x="252" y="875" font-family="Noto Sans SC, Microsoft YaHei, Arial" font-size="22" fill="#6F7468">◐</text>

  <!-- Top bar -->
  <rect x="296" y="0" width="1144" height="82" fill="#FFFFFF"/>
  <line x1="296" y1="82" x2="1440" y2="82" stroke="#E5E0D3"/>
  <text x="326" y="54" font-family="Noto Sans SC, Microsoft YaHei, Arial" font-size="28" fill="#405060">☰</text>
  <rect x="990" y="26" width="100" height="34" rx="17" fill="#FFFFFF" stroke="#E5E0D3"/>
  <text x="1016" y="48" font-family="Noto Sans SC, Microsoft YaHei, Arial" font-size="14" fill="#405060">🍴 饮食管理</text>
  <rect x="1104" y="26" width="92" height="34" rx="17" fill="#FFFFFF" stroke="#E5E0D3"/>
  <text x="1128" y="48" font-family="Noto Sans SC, Microsoft YaHei, Arial" font-size="14" fill="#405060">📖 知识库</text>
  <rect x="1210" y="26" width="114" height="34" rx="17" fill="#FFFFFF" stroke="#E5E0D3"/>
  <text x="1232" y="48" font-family="Noto Sans SC, Microsoft YaHei, Arial" font-size="14" fill="#405060">▥ 数据分析</text>
  <rect x="1338" y="26" width="78" height="34" rx="17" fill="#F2EFE6"/>
  <text x="1357" y="48" font-family="Noto Sans SC, Microsoft YaHei, Arial" font-size="14" font-weight="700" fill="#405060">wyh</text>

  <!-- Main empty agent workspace -->
  <rect x="296" y="82" width="1144" height="818" fill="#FFFFFF"/>
  <g transform="translate(0 0)">
    <circle cx="710" cy="274" r="50" fill="#FFF0DF"/>
    <path d="M686 294c36 8 70-8 74-38 2-14-6-22-18-26-12 20-36 22-54 12 9 13 11 26-2 52z" fill="#D88A3D"/>
    <rect x="672" y="306" width="78" height="34" rx="12" fill="#2F6F4E"/>
    <text x="775" y="316" font-family="Noto Sans SC, Microsoft YaHei, Arial" font-size="54" font-weight="800" fill="#2F6F4E">Food</text>
    <text x="910" y="316" font-family="Noto Sans SC, Microsoft YaHei, Arial" font-size="54" font-weight="800" fill="#D88A3D">Mate</text>
  </g>
  <text x="862" y="370" text-anchor="middle" font-family="Noto Sans SC, Microsoft YaHei, Arial" font-size="16" fill="#6F7468">记录、计算、分析和规划都从一个 Agent 工作台开始</text>

  <!-- Capability cards -->
  <g transform="translate(488 430)">
    <rect x="0" y="0" width="238" height="142" rx="10" fill="#FFFFFF" stroke="#E5E0D3" filter="url(#shadow)"/>
    <rect x="92" y="28" width="54" height="54" rx="12" fill="#E7F0E8"/>
    <text x="119" y="63" text-anchor="middle" font-family="Noto Sans SC, Microsoft YaHei, Arial" font-size="24" fill="#2F6F4E">▦</text>
    <text x="119" y="108" text-anchor="middle" font-family="Noto Sans SC, Microsoft YaHei, Arial" font-size="19" font-weight="800" fill="#23251F">热量计算</text>
    <text x="119" y="132" text-anchor="middle" font-family="Noto Sans SC, Microsoft YaHei, Arial" font-size="13" fill="#6F7468">克重换算与营养估算</text>
  </g>
  <g transform="translate(752 430)">
    <rect x="0" y="0" width="238" height="142" rx="10" fill="#FFFFFF" stroke="#E5E0D3" filter="url(#shadow)"/>
    <rect x="92" y="28" width="54" height="54" rx="12" fill="#E8F0F5"/>
    <text x="119" y="63" text-anchor="middle" font-family="Noto Sans SC, Microsoft YaHei, Arial" font-size="24" fill="#326B8E">▥</text>
    <text x="119" y="108" text-anchor="middle" font-family="Noto Sans SC, Microsoft YaHei, Arial" font-size="19" font-weight="800" fill="#23251F">摄入分析</text>
    <text x="119" y="132" text-anchor="middle" font-family="Noto Sans SC, Microsoft YaHei, Arial" font-size="13" fill="#6F7468">趋势、目标和异常点</text>
  </g>
  <g transform="translate(1016 430)">
    <rect x="0" y="0" width="238" height="142" rx="10" fill="#FFFFFF" stroke="#E5E0D3" filter="url(#shadow)"/>
    <rect x="92" y="28" width="54" height="54" rx="12" fill="#FFF0DF"/>
    <text x="119" y="63" text-anchor="middle" font-family="Noto Sans SC, Microsoft YaHei, Arial" font-size="24" fill="#D88A3D">▣</text>
    <text x="119" y="108" text-anchor="middle" font-family="Noto Sans SC, Microsoft YaHei, Arial" font-size="19" font-weight="800" fill="#23251F">复杂规划</text>
    <text x="119" y="132" text-anchor="middle" font-family="Noto Sans SC, Microsoft YaHei, Arial" font-size="13" fill="#6F7468">备餐菜单和购物清单</text>
  </g>

  <!-- Prompt suggestions -->
  <rect x="538" y="610" width="334" height="54" rx="12" fill="#FFFFFF" stroke="#E5E0D3"/>
  <text x="562" y="644" font-family="Noto Sans SC, Microsoft YaHei, Arial" font-size="15" fill="#23251F">🐔 计算 20 克鸡胸肉的卡路里</text>
  <rect x="888" y="610" width="334" height="54" rx="12" fill="#FFFFFF" stroke="#E5E0D3"/>
  <text x="912" y="644" font-family="Noto Sans SC, Microsoft YaHei, Arial" font-size="15" fill="#23251F">⚖️ 帮我记录今天的午餐</text>
  <rect x="538" y="682" width="334" height="54" rx="12" fill="#FFFFFF" stroke="#E5E0D3"/>
  <text x="562" y="716" font-family="Noto Sans SC, Microsoft YaHei, Arial" font-size="15" fill="#23251F">🗓 为 2 人制定一周备餐计划</text>
  <rect x="888" y="682" width="334" height="54" rx="12" fill="#FFFFFF" stroke="#E5E0D3"/>
  <text x="912" y="716" font-family="Noto Sans SC, Microsoft YaHei, Arial" font-size="15" fill="#23251F">📊 分析豆腐和牛肉的蛋白质含量</text>

  <!-- Tools and composer -->
  <text x="452" y="797" font-family="Noto Sans SC, Microsoft YaHei, Arial" font-size="15" font-weight="700" fill="#D88A3D">🔧 Tools（0/6）⌄</text>
  <text x="610" y="797" font-family="Noto Sans SC, Microsoft YaHei, Arial" font-size="15" font-weight="700" fill="#2F6F4E">🤖 Agents（0/1）⌄</text>
  <rect x="438" y="820" width="876" height="58" rx="14" fill="#FFFFFF" stroke="#D9D5C8"/>
  <text x="480" y="856" font-family="Noto Sans SC, Microsoft YaHei, Arial" font-size="20" fill="#9AA194">⌘</text>
  <text x="526" y="856" font-family="Noto Sans SC, Microsoft YaHei, Arial" font-size="16" fill="#9AA194">让 FoodMate 计算、分析、记录或规划...</text>
  <rect x="1268" y="833" width="34" height="34" rx="9" fill="#F2EFE6"/>
  <text x="1278" y="856" font-family="Noto Sans SC, Microsoft YaHei, Arial" font-size="18" fill="#9AA194">▷</text>
  <text x="722" y="894" font-family="Noto Sans SC, Microsoft YaHei, Arial" font-size="12" fill="#A8AEA3">FoodMate Agent 可能出错，重要结果请结合来源和工具轨迹核对。</text>

  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#23251F" flood-opacity="0.10"/>
    </filter>
  </defs>
</svg>

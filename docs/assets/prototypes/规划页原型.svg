  <text x="1016" y="304" font-family="Noto Sans SC, Microsoft YaHei, Arial" font-size="12" fill="#23251F">蛋白质：鸡胸肉 1.2kg、鸡蛋 12 个、豆腐 4 盒</text>
  <text x="1016" y="332" font-family="Noto Sans SC, Microsoft YaHei, Arial" font-size="12" fill="#23251F">蔬菜：西兰花、菠菜、番茄、胡萝卜</text>

  <rect x="1054" y="23" width="92" height="32" rx="16" fill="#FFFFFF" stroke="#E5E0D3"/><text x="1078" y="44" font-family="Noto Sans SC, Microsoft YaHei, Arial" font-size="14" fill="#405060">📖 知识库</text>

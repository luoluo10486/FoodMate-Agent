name: foodmate

services:
  postgres:
    image: postgres:16-alpine
    container_name: foodmate-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-FoodMate}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - foodmate-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [foodmate]

  redis:
    image: redis:7-alpine
    container_name: foodmate-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:-foodmate-redis-change-me}"]
    environment:
      REDISCLI_AUTH: ${REDIS_PASSWORD:-foodmate-redis-change-me}
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - foodmate-redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDISCLI_AUTH}\" ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [foodmate]

  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    container_name: foodmate-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
      MINIO_REGION_NAME: ${MINIO_REGION:-us-east-1}
      TZ: ${TZ:-Asia/Shanghai}
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - foodmate-minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks: [foodmate]

volumes:
  foodmate-postgres-data:
  foodmate-redis-data:
  foodmate-minio-data:

networks:
  foodmate:
    name: foodmate
    driver: bridge
